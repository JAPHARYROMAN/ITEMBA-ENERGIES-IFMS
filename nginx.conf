upstream ifms_web {
  server web:80;
}

upstream ifms_api {
  server api:3001;
}

# ---------------------------------------------------------------------------
# HTTP (port 80)
#
# Purpose:
#   - Serve ACME HTTP-01 challenges so Let's Encrypt / certbot can issue and
#     renew certificates (see docs/tls-setup.md).
#   - Answer the load-balancer health probe (/nginx-health) over plain HTTP.
#   - Redirect everything else to HTTPS.
#
# If you terminate TLS at an upstream load balancer / ingress instead of at
# nginx (path (b) in docs/tls-setup.md), remove the `return 301` redirect below
# and move the proxy `location` blocks from the 443 server into this server.
# ---------------------------------------------------------------------------
server {
  listen 80;
  # CHANGE ME: replace with your real domain (e.g. app.example.com).
  server_name your-domain.example.com;

  access_log /dev/stdout;
  error_log /dev/stderr warn;

  # LB / container health check — must stay reachable over plain HTTP.
  location = /nginx-health {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # Let's Encrypt HTTP-01 challenge files are served from /var/www/certbot.
  # certbot writes the token here; this must NOT be redirected to HTTPS.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Everything else is redirected to HTTPS.
  location / {
    return 301 https://$host$request_uri;
  }
}

# ---------------------------------------------------------------------------
# HTTPS (port 443) — TLS terminated at nginx.
#
# Certificates are mounted read-only at /etc/nginx/certs (see the nginx service
# in docker-compose.production.yml / docker-compose.staging.yml). Provide:
#   /etc/nginx/certs/fullchain.pem
#   /etc/nginx/certs/privkey.pem
# See docs/tls-setup.md for how to obtain them (certbot or bring-your-own).
# ---------------------------------------------------------------------------
server {
  listen 443 ssl;
  http2 on;
  # CHANGE ME: replace with your real domain (e.g. app.example.com).
  server_name your-domain.example.com;

  access_log /dev/stdout;
  error_log /dev/stderr warn;

  # --- TLS configuration ---------------------------------------------------
  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
  ssl_prefer_server_ciphers off;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  # --- Security headers ----------------------------------------------------
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;

  # LB / container health check (also available here over HTTPS).
  location = /nginx-health {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location = /health/live {
    proxy_pass http://ifms_api/health/live;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
  }

  location = /health/ready {
    proxy_pass http://ifms_api/health/ready;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
  }

  location /public/report/ {
    proxy_pass http://ifms_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
  }

  location = /api {
    return 301 /api/;
  }

  location /api/ {
    proxy_pass http://ifms_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
  }

  location = /docs {
    proxy_pass http://ifms_api/docs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /docs/ {
    proxy_pass http://ifms_api/docs/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/docs {
    proxy_pass http://ifms_api/docs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/docs/ {
    proxy_pass http://ifms_api/docs/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /docs-json {
    proxy_pass http://ifms_api/docs-json;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/docs-json {
    proxy_pass http://ifms_api/docs-json;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://ifms_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
