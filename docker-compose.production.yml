name: ifms-production

services:
  postgres:
    image: postgres:16-alpine
    container_name: ifms-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ifms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ifms
    volumes:
      - ifms_prod_pgdata:/var/lib/postgresql/data
      - ifms_prod_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ifms -d ifms"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    mem_limit: 1024m
    cpus: 1.00

  db-backup:
    image: postgres:16-alpine
    container_name: ifms-prod-db-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ifms
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ifms
      BACKUP_DIR: /backups
      BACKUP_RETENTION_COUNT: 30
      BACKUP_INTERVAL_SECONDS: 86400
    entrypoint:
      - /bin/sh
      - -lc
      - |
        sh /scripts/backup-db.sh
        while true; do
          sleep "$${BACKUP_INTERVAL_SECONDS}"
          sh /scripts/backup-db.sh
        done
    volumes:
      - ./scripts:/scripts:ro
      - ifms_prod_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "test -d /backups && ls -1 /backups/*.dump >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: 0.30

  api:
    image: ${API_IMAGE:-ghcr.io/example-org/ifms-api:production}
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ifms-prod-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env.production
    environment:
      PORT: 3001
      FRONTEND_ORIGIN: https://app.example.com
      DATABASE_URL: postgresql://ifms:${POSTGRES_PASSWORD}@postgres:5432/ifms
      ENABLE_SWAGGER: "false"
      RUN_MIGRATIONS_ON_STARTUP: "false"
      ALLOW_PROD_STARTUP_MIGRATIONS: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('node:http').get('http://127.0.0.1:3001/health/live', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    mem_limit: 2048m
    cpus: 2.00

  web:
    image: ${WEB_IMAGE:-ghcr.io/example-org/ifms-web:production}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ifms-prod-web
    restart: unless-stopped
    env_file:
      - ./.env.production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    mem_limit: 512m
    cpus: 0.75

  nginx:
    image: nginx:1.27-alpine
    container_name: ifms-prod-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    mem_limit: 256m
    cpus: 0.50

volumes:
  ifms_prod_pgdata:
  ifms_prod_backups:
